services:
  - type: web
    name: signa-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: signa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signa-redis
          property: connectionString
      - key: FRONTEND_URL
        value: "https://seu-dominio-vercel.vercel.app"
  - type: worker
    name: signa-celery
    env: python
    buildCommand: "./build.sh"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: signa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signa-redis
          property: connectionString
  - type: worker
    name: signa-celery-beat
    env: python
    buildCommand: "./build.sh"
    startCommand: "celery -A config beat -l INFO"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: signa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signa-redis
          property: connectionString

databases:
  - name: signa-db
    databaseName: signa
    user: signa

  - type: redis
    name: signa-redis
    ipAllowList: [] # internal only
